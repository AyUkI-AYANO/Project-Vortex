<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Vortex</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="panel">
    <h1>Project Vortex <span>v0.1.0</span></h1>

    <label>图片路径
      <input id="inputPath" placeholder="例如 /home/user/pic.png" />
    </label>
    <div class="row">
      <button id="btnOpen">打开</button>
      <button id="btnSave">另存为</button>
    </div>

    <hr />
    <button id="btnRotate">顺时针旋转 90°</button>

    <label>曝光倍率 (1.0 = 不变)
      <input id="exposure" type="number" min="0" max="5" step="0.1" value="1.1" />
    </label>
    <button id="btnExposure">应用曝光</button>

    <fieldset>
      <legend>裁切区域</legend>
      <div class="grid">
        <input id="cropX" type="number" value="0" placeholder="x" />
        <input id="cropY" type="number" value="0" placeholder="y" />
        <input id="cropW" type="number" value="300" placeholder="w" />
        <input id="cropH" type="number" value="300" placeholder="h" />
      </div>
      <button id="btnCrop">执行裁切</button>
    </fieldset>

    <fieldset>
      <legend>扩展模块</legend>
      <select id="moduleSelect"></select>
      <button id="btnRefreshModules">刷新模块列表</button>
      <button id="btnApplyModule">应用模块</button>
    </fieldset>

    <pre id="status">准备就绪</pre>
  </aside>

  <main class="viewer">
    <canvas id="canvas"></canvas>
  </main>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="app.js"></script>
</body>
</html>
